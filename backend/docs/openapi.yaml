      security:
        - BearerAuth: []
      responses:
        '200':
          description: Відгук схвалено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '403':
          $ref: '#/components/responses/Forbidden'

  /reviews/{id}:
    parameters:
      - $ref: '#/components/parameters/UUIDParam'
    delete:
      tags: [Admin]
      summary: Видалити відгук (admin)
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Видалено


  # USERS (profile)
  /users/me:
    get:
      tags: [Users]
      summary: Мій профіль
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Профіль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Users]
      summary: Оновити профіль
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: Оновлений профіль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /users/me/addresses:
    get:
      tags: [Users]
      summary: Мої адреси доставки
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Адреси
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserAddress'
    post:
      tags: [Users]
      summary: Додати адресу
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAddressCreate'
      responses:
        '201':
          description: Адреса додана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAddress'

  /users/me/addresses/{id}:
    parameters:
      - $ref: '#/components/parameters/UUIDParam'
    patch:
      tags: [Users]
      summary: Оновити адресу
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAddressCreate'
      responses:
        '200':
          description: Оновлена адреса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAddress'
    delete:
      tags: [Users]
      summary: Видалити адресу
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Видалено


  # ADMIN — загальна статистика
  /admin/stats:
    get:
      tags: [Admin]
      summary: Статистика магазину
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Дашборд статистика
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/users:
    get:
      tags: [Admin]
      summary: Список користувачів (admin)
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [customer, admin]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Користувачі
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'

  /admin/orders:
    get:
      tags: [Admin]
      summary: Всі замовлення (admin)
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [new, confirmed, in_production, shipped, delivered, cancelled]
        - in: query
          name: from_date
          schema:
            type: string
            format: date
        - in: query
          name: to_date
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Замовлення
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'

# COMPONENTS
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    SessionAuth:
      type: apiKey
      in: header
      name: X-Session-ID
      description: Для гостей без авторизації (кошик)

  parameters:
    UUIDParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Не авторизовано
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Unauthorized
            message: Необхідна авторизація
    Forbidden:
      description: Доступ заборонено
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Forbidden
            message: Недостатньо прав
    NotFound:
      description: Не знайдено
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Not Found
            message: Ресурс не знайдено
    Conflict:
      description: Конфлікт (наприклад, email вже існує)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Помилка валідації
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorBody'

  schemas:

    # ── Base ──
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    ValidationErrorBody:
      type: object
      properties:
        error:
          type: string
          example: Validation Error
        fields:
          type: object
          additionalProperties:
            type: string
          example:
            email: Невірний формат email
            price: Ціна не може бути від'ємною

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    # ── Auth ──
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        full_name:
          type: string
        phone:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Секунди до закінчення access токену
        user:
          $ref: '#/components/schemas/UserProfile'

    # ── Category ──
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Підвіски
        slug:
          type: string
          example: pendants
        icon_url:
          type: string
          nullable: true
        sort_order:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CategoryCreate:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        icon_url:
          type: string
          nullable: true
        sort_order:
          type: integer
        is_active:
          type: boolean

    # ── Material ──
    Material:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Срібло 925
        code:
          type: string
          example: AG925
        description:
          type: string
          nullable: true

    MaterialCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string

    # ── Symbol ──
    Symbol:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Хрест
        slug:
          type: string
          example: cross
        description:
          type: string
          nullable: true

    SymbolCreate:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string

    # ── Product ───
    ProductImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        alt_text:
          type: string
          nullable: true
        sort_order:
          type: integer
        is_cover:
          type: boolean

    ProductImageCreate:
      type: object
      required: [url]
      properties:
        url:
          type: string
        alt_text:
          type: string
        sort_order:
          type: integer
        is_cover:
          type: boolean

    ProductVariant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Розмір 17
        price_modifier:
          type: number
          example: 50
        stock_qty:
          type: integer

    ProductVariantCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        price_modifier:
          type: number
          default: 0
        stock_qty:
          type: integer
          default: 0

    ProductSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Підвіска Хрест
        slug:
          type: string
        price:
          type: number
          example: 1200.00
        price_old:
          type: number
          nullable: true
        stock_qty:
          type: integer
        is_active:
          type: boolean
        is_featured:
          type: boolean
        cover_image:
          $ref: '#/components/schemas/ProductImage'
          nullable: true
        category:
          $ref: '#/components/schemas/Category'
        created_at:
          type: string
          format: date-time

    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            sku:
              type: string
              nullable: true
            weight_grams:
              type: number
              nullable: true
            is_custom:
              type: boolean
            images:
              type: array
              items:
                $ref: '#/components/schemas/ProductImage'
            variants:
              type: array
              items:
                $ref: '#/components/schemas/ProductVariant'
            materials:
              type: array
              items:
                $ref: '#/components/schemas/Material'
            symbols:
              type: array
              items:
                $ref: '#/components/schemas/Symbol'
            updated_at:
              type: string
              format: date-time

    ProductCreate:
      type: object
      required: [category_id, name, slug, price]
      properties:
        category_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0
        price_old:
          type: number
          nullable: true
        stock_qty:
          type: integer
          default: 0
        sku:
          type: string
        weight_grams:
          type: number
        is_active:
          type: boolean
          default: true
        is_custom:
          type: boolean
          default: false
        is_featured:
          type: boolean
          default: false
        material_ids:
          type: array
          items:
            type: string
            format: uuid
        symbol_ids:
          type: array
          items:
            type: string
            format: uuid

    ProductListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ── Cart ──
    CartItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product:
          $ref: '#/components/schemas/ProductSummary'
        variant:
          $ref: '#/components/schemas/ProductVariant'
          nullable: true
        quantity:
          type: integer
        unit_price:
          type: number
        subtotal:
          type: number

    CartResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        subtotal:
          type: number
        total_items:
          type: integer

    CartItemCreate:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: string
          format: uuid
        variant_id:
          type: string
          format: uuid
          nullable: true
        quantity:
          type: integer
          minimum: 1

    # ── Order ───
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
          nullable: true
        product_name:
          type: string
        sku:
          type: string
          nullable: true
        unit_price:
          type: number
        quantity:
          type: integer
        subtotal:
          type: number
        custom_note:
          type: string
          nullable: true

    OrderCreate:
      type: object
      required: [customer_name, customer_phone, delivery_method, payment_method, items]
      properties:
        customer_name:
          type: string
        customer_phone:
          type: string
        customer_email:
          type: string
          format: email
        delivery_method:
          type: string
          enum: [nova_poshta, ukrposhta, pickup]
        delivery_city:
          type: string
        delivery_address:
          type: string
        nova_poshta_ref:
          type: string
        payment_method:
          type: string
          enum: [card, cod, bank_transfer]
        promo_code:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id:
                type: string
                format: uuid
              variant_id:
                type: string
                format: uuid
                nullable: true
              quantity:
                type: integer
                minimum: 1
              custom_note:
                type: string

    OrderSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [new, confirmed, in_production, shipped, delivered, cancelled]
        customer_name:
          type: string
        total_amount:
          type: number
        payment_status:
          type: string
          enum: [pending, paid, refunded]
        delivery_method:
          type: string
        created_at:
          type: string
          format: date-time

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            customer_phone:
              type: string
            customer_email:
              type: string
              nullable: true
            delivery_city:
              type: string
              nullable: true
            delivery_address:
              type: string
              nullable: true
            nova_poshta_ref:
              type: string
              nullable: true
            subtotal:
              type: number
            discount_amount:
              type: number
            shipping_cost:
              type: number
            notes:
              type: string
              nullable: true
            admin_notes:
              type: string
              nullable: true
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'
            updated_at:
              type: string
              format: date-time

    OrderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ── Custom Request ──
    CustomRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_name:
          type: string
        customer_phone:
          type: string
        customer_email:
          type: string
          nullable: true
        description:
          type: string
        budget:
          type: number
          nullable: true
        reference_urls:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [new, in_review, quoted, approved, rejected]
        admin_notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CustomRequestCreate:
      type: object
      required: [customer_name, customer_phone, description]
      properties:
        customer_name:
          type: string
        customer_phone:
          type: string
        customer_email:
          type: string
          format: email
        description:
          type: string
        budget:
          type: number
          nullable: true
        reference_urls:
          type: array
          items:
            type: string
            format: uri

    # ── Promo Code ───
    PromoCode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        discount_type:
          type: string
          enum: [percent, fixed]
        discount_value:
          type: number
        min_order_amount:
          type: number
        max_uses:
          type: integer
          nullable: true
        used_count:
          type: integer
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    PromoCodeCreate:
      type: object
      required: [code, discount_type, discount_value]
      properties:
        code:
          type: string
          example: CHRISTMAS10
        discount_type:
          type: string
          enum: [percent, fixed]
        discount_value:
          type: number
          example: 10
        min_order_amount:
          type: number
          default: 0
        max_uses:
          type: integer
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
          default: true

    PromoCodeValidation:
      type: object
      properties:
        valid:
          type: boolean
        discount_type:
          type: string
          enum: [percent, fixed]
        discount_value:
          type: number
        discount_amount:
          type: number
          description: Реальна сума знижки для цього замовлення

    # ── Review ───
    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        author_name:
          type: string
          nullable: true
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        is_approved:
          type: boolean
        created_at:
          type: string
          format: date-time

    ReviewCreate:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true

    # ── User ───
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: [customer, admin]
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserProfileUpdate:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string

    UserAddress:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          nullable: true
          example: Дім
        city:
          type: string
        street:
          type: string
        zip_code:
          type: string
          nullable: true
        nova_poshta_ref:
          type: string
          nullable: true
        is_default:
          type: boolean

    UserAddressCreate:
      type: object
      required: [city, street]
      properties:
        label:
          type: string
        city:
          type: string
        street:
          type: string
        zip_code:
          type: string
        nova_poshta_ref:
          type: string
        is_default:
          type: boolean
          default: false

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ── Admin Stats ────
