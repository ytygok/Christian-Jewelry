openapi: 3.0.3

info:
  title: Christian Jewelry API
  description: |
    ## REST API для інтернет-магазину християнських прикрас

    ### Аутентифікація
    Використовується **Bearer JWT** токен:
    ```
    Authorization: Bearer <token>
    ```
    Токен отримується при реєстрації або вході (`/api/auth/login`).

    ### Ролі
    | Роль | Доступ |
    |------|--------|
    | `customer` | каталог, кошик, свої замовлення, профіль |
    | `admin` | все вище + керування товарами, всі замовлення, статистика |

    ### Сумісність з фронтендом
    `POST /api/orders` приймає як старий формат (localStorage),
    так і новий REST-формат — сервер сам визначає.

  version: 1.0.0
  contact:
    name: Christian Jewelry
    email: admin@christian-jewelry.ua

servers:
  - url: http://localhost:3000/api
    description: Локальна розробка
  - url: https://api.christian-jewelry.ua
    description: Продакшн

tags:
  - name: Auth
    description: Реєстрація та вхід
  - name: Categories
    description: Категорії — каблучки, сережки, підвіски, браслети, кольє, брошки, індивідуальне
  - name: Products
    description: Каталог виробів
  - name: Orders
    description: Замовлення
  - name: Users
    description: Профіль користувача
  - name: Admin
    description: Адміністрування (тільки role=admin)

# ================================================================
# PATHS
# ================================================================
paths:

  # ── Health ─────────────────────────────────────────────────
  /health:
    get:
      tags: [Auth]
      summary: Перевірка роботи сервера
      security: []
      responses:
        '200':
          description: Сервер працює
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  time:
                    type: string
                    format: date-time

  # ── AUTH ───────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Реєстрація нового покупця
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: Іван
              surname: Петренко
              phone: "+380501234567"
              email: ivan@example.com
              password: StrongPass123!
      responses:
        '201':
          description: Зареєстровано. Повертає токен та профіль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email вже зареєстровано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вхід в акаунт
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: ivan@example.com
              password: StrongPass123!
      responses:
        '200':
          description: Успішний вхід
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Невірний email або пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags: [Auth]
      summary: Мій профіль (з токену)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Профіль поточного користувача
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── CATEGORIES ─────────────────────────────────────────────
  /categories:
    get:
      tags: [Categories]
      summary: Список категорій виробів
      security: []
      responses:
        '200':
          description: Категорії відсортовані за sort_order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
              example:
                - id: uuid-1
                  name: Каблучки / Перстні
                  slug: rings
                  sort_order: 1
                  is_active: true
                - id: uuid-2
                  name: Підвіски
                  slug: pendants
                  sort_order: 3
                  is_active: true

    post:
      tags: [Categories]
      summary: Створити категорію (admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWrite'
            example:
              name: Іконки
              slug: icons
              sort_order: 8
      responses:
        '201':
          description: Категорія створена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Slug вже існує
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /categories/{id}:
    parameters:
      - $ref: '#/components/parameters/ID'
    patch:
      tags: [Categories]
      summary: Оновити категорію (admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWrite'
      responses:
        '200':
          description: Оновлена категорія
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Categories]
      summary: Приховати категорію (admin)
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Деактивовано
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── PRODUCTS ───────────────────────────────────────────────
  /products:
    get:
      tags: [Products]
      summary: Каталог виробів з фільтрами
      security: []
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Slug категорії (rings, pendants, bracelets...)
          example: pendants
        - in: query
          name: min_price
          schema:
            type: number
          example: 500
        - in: query
          name: max_price
          schema:
            type: number
          example: 3000
        - in: query
          name: search
          schema:
            type: string
          description: Пошук по назві виробу
          example: хрест
        - in: query
          name: sort
          schema:
            type: string
            enum: [newest, price_asc, price_desc]
          default: newest
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Список виробів з пагінацією
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'

    post:
      tags: [Products]
      summary: Додати виріб (admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWrite'
            example:
              category_id: uuid-категорії
              name: Підвіска Хрест з квітами
              slug: pidviska-khrest-kvity
              description: Срібна підвіска ручної роботи з квітковим декором
              price: 1850
              stock_qty: 3
              material_ids: [uuid-срібло-925]
              symbol_ids: [uuid-хрест]
      responses:
        '201':
          description: Виріб створено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Slug вже існує
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/ValidationError'

  /products/{id}:
    parameters:
      - $ref: '#/components/parameters/ID'
    get:
      tags: [Products]
      summary: Деталі виробу (за id або slug)
      security: []
      responses:
        '200':
          description: Виріб з галереєю, матеріалами та символами
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Products]
      summary: Оновити виріб (admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWrite'
      responses:
        '200':
          description: Оновлений виріб
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Products]
      summary: Деактивувати виріб (admin)
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Деактивовано (м'яке видалення)
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── ORDERS ─────────────────────────────────────────────────
  /orders:
    post:
      tags: [Orders]
      summary: Оформити замовлення
      description: |
        Приймає два формати:

        **Новий формат** (масив items):
        ```json
        {
          "customer_name": "Іван",
          "customer_phone": "+380501234567",
          "delivery_method": "nova_poshta",
          "items": [{ "product_id": "uuid", "quantity": 1 }]
        }
        ```

        **Старий формат** (для сумісності з фронтом на localStorage):
        ```json
        {
          "userName": "Іван",
          "userPhone": "+380501234567",
          "product": "Підвіска Хрест",
          "material": "Срібло 925",
          "notes": "Подарунок"
        }
        ```
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '201':
          description: Замовлення прийнято
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '400':
          description: Товар відсутній або інша помилка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/ValidationError'

    get:
      tags: [Orders]
      summary: Список замовлень (мої або всі для admin)
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [new, confirmed, in_production, shipped, delivered, cancelled]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Замовлення
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /orders/{id}:
    parameters:
      - $ref: '#/components/parameters/ID'
    get:
      tags: [Orders]
      summary: Деталі замовлення
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Замовлення з позиціями
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/ID'
    post:
      tags: [Orders]
      summary: Скасувати замовлення
      description: Дозволено якщо статус ще не `shipped` або `delivered`
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Замовлення скасовано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '400':
          description: Неможливо скасувати — вже відправлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          $ref: '#/components/responses/Forbidden'

  /orders/{id}/status:
    parameters:
      - $ref: '#/components/parameters/ID'
    patch:
      tags: [Admin]
      summary: Змінити статус замовлення (admin)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [new, confirmed, in_production, shipped, delivered, cancelled]
                admin_notes:
                  type: string
                  example: Виготовляємо, готовність ~3 дні
                nova_poshta_ref:
                  type: string
                  example: "20450000000000"
                  description: ТТН Нової Пошти (для статусу shipped)
            example:
              status: shipped
              nova_poshta_ref: "20450000000000"
              admin_notes: Відправлено НП, відстежуйте за ТТН
      responses:
        '200':
          description: Статус змінено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── USERS ──────────────────────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      summary: Мій профіль
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Профіль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Users]
      summary: Оновити профіль
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Іван
                surname:
                  type: string
                  example: Петренко
                phone:
                  type: string
                  example: "+380501234567"
      responses:
        '200':
          description: Оновлений профіль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users:
    get:
      tags: [Admin]
      summary: Список користувачів (admin)
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [customer, admin]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Користувачі
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── ADMIN ──────────────────────────────────────────────────
  /admin/stats:
    get:
      tags: [Admin]
      summary: Статистика магазину (admin)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Дашборд з ключовими показниками
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
              example:
                orders:
                  total: 142
                  new: 5
                  in_production: 8
                  revenue_total: 187600
                  revenue_this_month: 23400
                products:
                  total: 67
                  out_of_stock: 3
                users:
                  total: 89
                  new_this_month: 12
                custom_requests:
                  total: 24
                  pending: 4
                reviews:
                  pending_moderation: 2
        '403':
          $ref: '#/components/responses/Forbidden'

# ================================================================
# COMPONENTS
# ================================================================
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT токен з `/api/auth/login`

  parameters:
    ID:
      name: id
      in: path
      required: true
      description: UUID або slug ресурсу
      schema:
        type: string

  responses:
    Unauthorized:
      description: Потрібна авторизація
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Токен відсутній
    Forbidden:
      description: Доступ заборонено (потрібна роль admin)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Тільки для адміністратора
    NotFound:
      description: Не знайдено
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Виріб не знайдено
    ValidationError:
      description: Помилка валідації
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      properties:
        error:
          type: string

    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        total_pages:
          type: integer

    # ── Auth ────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Іван
        surname:
          type: string
          example: Петренко
        phone:
          type: string
          example: "+380501234567"
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT Bearer токен (7 днів)
        user:
          $ref: '#/components/schemas/UserProfile'

    # ── User ────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        surname:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
        role:
          type: string
          enum: [customer, admin]
        created_at:
          type: string
          format: date-time

    UserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ── Category ────────────────────────────────────────────
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Підвіски
        slug:
          type: string
          example: pendants
        icon_url:
          type: string
          nullable: true
        sort_order:
          type: integer
        is_active:
          type: boolean

    CategoryWrite:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        icon_url:
          type: string
          nullable: true
        sort_order:
          type: integer
          default: 0
        is_active:
          type: boolean
          default: true

    # ── Product ─────────────────────────────────────────────
    ProductImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        alt_text:
          type: string
          nullable: true
        is_cover:
          type: boolean
        sort_order:
          type: integer

    ProductSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Підвіска Хрест з квітами
        slug:
          type: string
        price:
          type: number
          example: 1850
        price_old:
          type: number
          nullable: true
          example: 2200
        stock_qty:
          type: integer
        is_featured:
          type: boolean
        cover_image:
          type: string
          nullable: true
          description: URL головного фото
        category_name:
          type: string
          example: Підвіски
        category_slug:
          type: string
          example: pendants
        created_at:
          type: string
          format: date-time

    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            sku:
              type: string
              nullable: true
            weight_grams:
              type: number
              nullable: true
            is_custom:
              type: boolean
            images:
              type: array
              items:
                $ref: '#/components/schemas/ProductImage'
            materials:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                    example: Срібло 925
                  code:
                    type: string
                    example: AG925
            symbols:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                    example: Хрест
                  slug:
                    type: string
                    example: cross
            updated_at:
              type: string
              format: date-time

    ProductWrite:
      type: object
      required: [category_id, name, slug, price]
      properties:
        category_id:
          type: string
          format: uuid
        name:
          type: string
          example: Підвіска Хрест
        slug:
          type: string
          example: pidviska-khrest
        description:
          type: string
          nullable: true
        price:
          type: number
          minimum: 0
          example: 1850
        price_old:
          type: number
          nullable: true
          example: 2200
        stock_qty:
          type: integer
          default: 0
        sku:
          type: string
          nullable: true
          example: PND-001
        weight_grams:
          type: number
          nullable: true
        is_active:
          type: boolean
          default: true
        is_featured:
          type: boolean
          default: false
          description: Показати на головній сторінці
        is_custom:
          type: boolean
          default: false
          description: Індивідуальний виріб
        material_ids:
          type: array
          items:
            type: string
            format: uuid
        symbol_ids:
          type: array
          items:
            type: string
            format: uuid

    ProductList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ── Order ───────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
          nullable: true
        product_name:
          type: string
          example: Підвіска Хрест
        sku:
          type: string
          nullable: true
        unit_price:
          type: number
        quantity:
          type: integer
        subtotal:
          type: number
        custom_note:
          type: string
          nullable: true
          example: "Матеріал: Срібло 925, Стиль: класика"

    OrderCreate:
      type: object
      required: [customer_phone]
      description: |
        Підтримує два формати — новий (items[]) та старий (product як рядок)
      properties:
        customer_name:
          type: string
          example: Іван Петренко
        customer_phone:
          type: string
          example: "+380501234567"
        customer_email:
          type: string
          format: email
          nullable: true
        delivery_method:
          type: string
          enum: [nova_poshta, ukrposhta, pickup]
          default: nova_poshta
        delivery_city:
          type: string
          example: Київ
        delivery_address:
          type: string
          nullable: true
        nova_poshta_ref:
          type: string
          nullable: true
          example: "5"
          description: Номер відділення Нової Пошти
        payment_method:
          type: string
          enum: [card, cod, bank_transfer]
          default: cod
        notes:
          type: string
          nullable: true
          example: Подарункова упаковка, будь ласка
        items:
          type: array
          description: Новий формат (масив товарів)
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id:
                type: string
                format: uuid
              variant_id:
                type: string
                format: uuid
                nullable: true
              quantity:
                type: integer
                minimum: 1
              custom_note:
                type: string
        userName:
          type: string
          description: Старий формат (сумісність з фронтом)
        userEmail:
          type: string
          description: Старий формат
        userPhone:
          type: string
          description: Старий формат
        product:
          type: string
          description: Старий формат — назва виробу рядком
        material:
          type: string
          description: Старий формат
        style:
          type: string
          description: Старий формат
        extras:
          type: string
          description: Старий формат

    OrderSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [new, confirmed, in_production, shipped, delivered, cancelled]
        customer_name:
          type: string
        customer_phone:
          type: string
        total_amount:
          type: number
        payment_status:
          type: string
          enum: [pending, paid, refunded]
        delivery_method:
          type: string
        nova_poshta_ref:
          type: string
          nullable: true
        items_count:
          type: integer
        created_at:
          type: string
          format: date-time

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            customer_email:
              type: string
              nullable: true
            delivery_city:
              type: string
              nullable: true
            delivery_address:
              type: string
              nullable: true
            subtotal:
              type: number
            shipping_cost:
              type: number
            notes:
              type: string
              nullable: true
            admin_notes:
              type: string
              nullable: true
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItem'
            updated_at:
              type: string
              format: date-time

    OrderList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # ── Admin Stats ─────────────────────────────────────────
    AdminStats:
      type: object
      properties:
        orders:
          type: object
          properties:
            total:
              type: integer
            new:
              type: integer
            in_production:
              type: integer
            revenue_total:
              type: number
            revenue_this_month:
              type: number
        products:
          type: object
          properties:
            total:
              type: integer
            out_of_stock:
              type: integer
        users:
          type: object
          properties:
            total:
              type: integer
            new_this_month:
              type: integer
        custom_requests:
          type: object
          properties:
            total:
              type: integer
            pending:
              type: integer
        reviews:
          type: object
          properties:
            pending_moderation:
              type: integer
